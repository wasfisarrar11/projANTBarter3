<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find Posting | AntBarter</title>
    <link rel="stylesheet" href="AB_home2_update2.css" />
    <script defer src="AB_home_ui2.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    />
    <script defer src="AB_find_bp.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <!-- Add this line for CSS -->
  </head>
  <body>
    <header>
      <nav>
        <div>
          <a href="AB_home.html">Home</a>
          <a href="AB_about.html">About</a>
          <a href="AB_how-it-works.html">How It Works</a>
          <a href="AB_contact.html">Contact</a>
          <a href="AB_create_bp.html">Create Posting</a>
          <a href="AB_find_bp.html">Find Posting</a>
        </div>
        <div id="userLoggedIn" style="display: flex">
          <a href="AB_profile.html">
            <i class="fas fa-user"></i>
          </a>
          <p id="userName">First Last</p>
          <a href="AB_messages.html">
            <i class="fas fa-envelope"></i>
          </a>
          <p>Messages</p>
        </div>
        <button id="sign-out">Sign Out</button>
      </nav>
    </header>

    <header>
      <h1>
        <span class="large-letter">A</span>ll
        <span class="large-letter">N</span>ational
        <span class="large-letter">T</span>rading
      </h1>
      <!-- Rest of the HTML remains unchanged -->
    </header>

    <div class="hero">
      <div class="logo-container">
        <img src="dollar_pic.png" alt="Dollar Image" class="example-image" />
        <img src="AB_business_logo2.png" alt="Logo" class="logo" />
      </div>
    </div>

    <main>
      <h2>Find Barter Posting</h2>
      <div class="search-wrapper">
        <label for="search">Search for Goods or Services:</label>
        <input type="search" id="search" data-search />
      </div>
      <div
        class="user-cards"
        id="user-cards-container"
        data-user-cards-container
      >
        <!-- User cards will be dynamically injected here -->
      </div>
      <template data-user-template>
        <div class="card">
          <div class="header" data-header></div>
          <div class="body" data-body></div>
          <button
            class="start-barter-btn-default"
            onclick="redirectToBarterAgreement()"
          >
            Start Barter Agreement
          </button>
        </div>
      </template>
    </main>
    <footer>
      <p>&copy; 2024 AntBarter | Designed with ❤️</p>
    </footer>
  </body>
</html>
